spring:
  datasource:
    # 환경변수가 설정되어 있으면 그것을 사용하고, 없으면 기본값을 사용합니다.
    # JDBC URL에 useGSSAPI=false 와 restrictedAuth=mysql_native_password 를 명시해
    # MariaDB 드라이버가 GSSAPI(Kerberos)로 폴백하지 않고 username/password로 인증하도록 강제합니다.
    url: ${SPRING_DATASOURCE_URL:jdbc:mariadb://localhost:3306/test?useSSL=false&serverTimezone=UTC&useGSSAPI=false&restrictedAuth=mysql_native_password}
    username: ${SPRING_DATASOURCE_USERNAME:test}
    password: ${SPRING_DATASOURCE_PASSWORD:test}
    driver-class-name: org.mariadb.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show_sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MariaDBDialect
        format_sql: true
        order_inserts: true
        order_updates: true
        jdbc:
          batch_size: 100

  flyway:
    enabled: true
    fail-on-missing-locations: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    encoding: UTF-8

logging:
  level:
    org.hibernate.SQL: debug
    org.hibernate.orm.jdbc.bind: trace
    org.springframework.security: trace
    org.flywaydb: debug
