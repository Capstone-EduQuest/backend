services:
  db:
    image: mariadb
    container_name: eduquest-db
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - eduquest-net
  garage:
    image: dxflrs/garage:v2.2.0
    container_name: garage
    restart: unless-stopped
    ports:
      - "3900:3900"   # S3 API
      - "3901:3901"   # RPC (클러스터용)
    volumes:
      - ./garage-data:/var/lib/garage/data
      - ./garage-meta:/var/lib/garage/meta
      - ./garage.toml:/etc/garage.toml
    networks:
      - eduquest-net
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: eduquest-backend:latest
    container_name: eduquest-backend
    env_file:
      - .env
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - eduquest-net
    restart: on-failure

volumes:
  mariadb_data:

networks:
  eduquest-net:
    driver: bridge



